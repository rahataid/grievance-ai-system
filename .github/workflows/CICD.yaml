name: CICD
on:
  push:
    branches:
      - dev
    paths:
      - 'services/**'
      - 'shared/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      service_name:
        description: "Microservice to build (e.g., api-gateway, asr-service) or 'all'"
        required: true
        default: "all"
      image_tag:
        description: "Docker image tag"
        required: true
        default: "dev"

env:
  REGISTRY_OWNER: rumsan

jobs:
  # 1. Determine which services need to be built
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Matrix Packages
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.service_name }}" != "all" ]; then
            # Manual trigger for a specific service
            echo "services=[\"${{ github.event.inputs.service_name }}\"]" >> $GITHUB_OUTPUT
          else
            # Get list of all services under services/ directory
            SERVICES_JSON=$(ls -d services/*/ | sed 's/services\///;s/\///' | jq -R . | jq -s -c .)
            echo "services=${SERVICES_JSON}" >> $GITHUB_OUTPUT
          fi

  # 2. Build and Push changed services concurrently via Matrix
  build-and-push:
    needs: detect-changes
    name: Build and Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Path filtering check to skip un-changed microservices on automated pushes
      - name: Check for changes in service
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'services/${{ matrix.service }}/**'
              - 'shared/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile'

      - name: Import secrets from Vault
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: hashicorp/vault-action@v3
        id: vault
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/rumsan-ai/chatty-be/Docker DOCKER_USERNAME | DOCKER_USERNAME ;
            github/data/rumsan-ai/chatty-be/Docker DOCKER_PASSWORD | DOCKER_PASSWORD ;

      - name: Set image tag
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push microservice image
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          # Creates clean separate images per service (e.g., rumsan/grievance-api-gateway:latest)
          tags: |
            ${{ env.REGISTRY_OWNER }}/grievance-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_OWNER }}/grievance-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
