name: CICD
on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'services/**'
      - 'shared/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      service_name:
        description: "Microservice to build (e.g., api-gateway, asr-service) or 'all'"
        required: true
        default: "all"
      image_tag:
        description: "Docker image tag"
        required: true
        default: "dev"

env:
  REGISTRY_OWNER: rumsan

jobs:
  # 1. Determine which services need to be built
  detect-changes:
    runs-on: arc-runner-set
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # REMOVED: "Free runner disk space" step. It does nothing on ARC runners.

      # Fixed to return clean JSON arrays and pass an explicit boolean flag to prevent matrix errors
      # Pentest matrix generation
      - name: Set Matrix Packages
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.service_name }}" != "all" ]; then
            echo "services=[\"${{ github.event.inputs.service_name }}\"]" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            SERVICES_JSON=$(ls -d services/*/ | sed 's/services\///;s/\///' | jq -R . | jq -s -c .)
            if [ "$SERVICES_JSON" = "[]" ] || [ -z "$SERVICES_JSON" ]; then
              echo "services=[\"none\"]" >> $GITHUB_OUTPUT
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "services=${SERVICES_JSON}" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && matrix.service != 'none'
    name: Build and Push
    runs-on: arc-runner-set
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for changes in service
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'services/${{ matrix.service }}/**'
              - 'shared/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile'

      - name: Import secrets from Vault
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: hashicorp/vault-action@v3
        id: vault
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/rumsan-ai/chatty-be/Docker DOCKER_USERNAME | DOCKER_USERNAME ;
            github/data/rumsan-ai/chatty-be/Docker DOCKER_PASSWORD | DOCKER_PASSWORD ;

      - name: Set image tag
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Docker Hub
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      # FIX: Removed the OCI Tarball writing step completely.
      # Because your runner pod is destroyed immediately after this finishes, exporting to a Tarball 
      # and using crane just consumes double the disk space on your Kubernetes node. 
      # The build-push-action can push straight to your registry cleanly.
      - name: Build and Push directly to Registry
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          tags: |
            ${{ env.REGISTRY_OWNER }}/grievance-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_OWNER }}/grievance-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # REMOVED: "Push tarball via crane" step (Handled natively above).
      # REMOVED: "Cleanup tarball and prune" step (Pod recycling takes care of this).

